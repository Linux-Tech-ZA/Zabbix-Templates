        # --- Calculated rate items (per-minute derivatives of monotonic counters) ---

        - uuid: 354cbe881bd04444bd82711fc896a103
          name: 'UDP Answers (/min)'
          type: CALCULATED
          key: 'pdns.rate[udp-answers]'
          delay: 60s
          value_type: FLOAT
          units: ans/min
          params: 'rate(/PowerDNS Stats/pdns.stats[udp-answers],1m)*60'
          description: 'UDP answers sent per minute (rate derived from monotonic counter udp-answers). Use this for dashboards instead of the raw total.'

