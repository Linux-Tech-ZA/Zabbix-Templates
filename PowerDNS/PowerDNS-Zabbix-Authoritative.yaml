          delay: 60s
          triggers:
            - uuid: 248bb152e0574701b98a14eb7c8e4f54
              expression: 'last(/PowerDNS Stats/pdns.make-dns-query)="FAIL"'
              name: 'DNS server does not respond to queries'
              priority: HIGH
              description: 'PowerDNS does not respond to test DNS queries.'

