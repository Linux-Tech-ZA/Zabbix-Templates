    - uuid: cc576f9ab14f44c084fb7f5f92072724
      template: 'PowerDNS Stats'
      name: 'PowerDNS Stats'
      description: |
        PowerDNS Authoritative Server 4.8.4 statistics
        Only includes metrics confirmed present via pdns_control list.
        Compatible with Zabbix 7.0 LTS.

        RAW COUNTERS: Items collected via pdns.stats[*] are monotonic totals that
        increase since server start. They produce ever-growing graphs and are kept
        for historical reference and delta calculations.

        CALCULATED RATES: Items with key pdns.rate[*] express per-minute rates
        derived from the raw counters using Zabbix rate() function. Use these for
        dashboards and trending to see current activity levels.

        CALCULATED RATIOS: Items with key pdns.ratio[*] express percentage ratios
        (cache hit rates, error percentages) calculated from the raw counters.
        These provide actionable insight into cache efficiency and error conditions.
      groups:
        - name: Templates
      items:
